[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN", "S", "B", "A"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "ANN401", "E501"]
[tool.mypy]
strict = true
python_version = "3.12"
disable_error_code = ["import-untyped", "var-annotated", "misc", "no-any-return"]
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
