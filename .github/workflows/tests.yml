name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: "Python ${{ matrix.python-version }} / HA ${{ matrix.ha-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        ha-version: ["2024.1.0", "2024.6.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            pytest-asyncio \
            pytest-homeassistant-custom-component==${{ matrix.ha-version }} \
            pytest-cov \
            freezegun

      - name: Run tests
        run: |
          pytest allears_ha/tests/ \
            --cov=allears_ha/custom_components/allears \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}-ha${{ matrix.ha-version }}
          path: coverage.xml
          retention-days: 14
